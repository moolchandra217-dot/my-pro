<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ashuai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="ai.css">
</head>
<body>
    <div class="container">
        <h1>ASHU AI IMAGE GENERATER</h1>
        <textarea placeholder="Type option button.."></textarea>
        <div class="option">
            <select name="sssss" id="select1">
                <option value="a">nature </option>
                <option value="b">city's</option>
                <option value="c">animal</option>
                <option value="d">people</option>
            
            </select>
            <select name="inimg" id="select2">
                <option value="a2">Asia</option>
                <option value="b2">America</option>
                <option value="c2">Australia</option>
                <option value="d2">Africa</option>
                
                
            </select>
            <button class="generate">GENERATE</button>
            <div class="imges">
                <div class="div1"></div>
                <div class="div2"></div>
                <div class="div3"></div>
            </div>
           
            
        </div>
    </div>
    <img class="img" src="text.png" alt="">
    <div class="nano"><img src="sun.png" alt=""></div>
    <script src="ai.js"></script>
</body>
</html>
